<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬라어 동사 암기카드 — 시험 범위 완전판</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b27;
  --card2: #1e2538;
  --card3: #252d42;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --blue: #7c9ed9;
  --blue2: #a8c4f0;
  --red: #e07b6a;
  --red2: #f0a898;
  --green: #6fcf97;
  --purple: #b090e0;
  --text: #e8eaf0;
  --text2: #9ba3b8;
  --text3: #6b7490;
  --border: #2a3050;
  --border2: #3a4468;
  --active-a: #1a2540;
  --active-b: #1a2530;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0a1020 0%, #111827 50%, #0d1a30 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
}
.header-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.header-stats {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text2);
}
.stat-val { color: var(--gold); font-weight: 700; }

/* ── TABS ── */
.tab-bar {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  padding: 0 12px;
  gap: 2px;
}

.tab-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 12px;
  font-weight: 600;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text2); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.08em; }

.filter-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.filter-chip {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--gold); color: var(--gold); }
.filter-chip.active { background: var(--gold); border-color: var(--gold); color: #0d1117; }
.filter-chip.tense-pres.active { background: var(--blue); border-color: var(--blue); }
.filter-chip.tense-fut.active  { background: var(--green); border-color: var(--green); color: #0d1117; }
.filter-chip.tense-imp.active  { background: var(--purple); border-color: var(--purple); color: #0d1117; }
.filter-chip.tense-aor.active  { background: var(--red); border-color: var(--red); }
.filter-chip.voice-act.active  { background: #2a4a7a; border-color: var(--blue); color: var(--blue2); }
.filter-chip.voice-pas.active  { background: #4a1a1a; border-color: var(--red); color: var(--red2); }
.filter-chip.voice-mid.active  { background: #2a1a4a; border-color: var(--purple); color: var(--purple); }

.sep { width: 1px; background: var(--border); height: 20px; margin: 0 4px; }

/* ── PROGRESS ── */
.progress-bar-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--gold));
  border-radius: 2px;
  transition: width 0.3s;
}
.progress-text { font-size: 11px; color: var(--text2); white-space: nowrap; }

/* ── MAIN CONTENT AREAS ── */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── SET A: 어미 패턴 ── */
.pattern-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.pattern-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.pattern-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

.pattern-head {
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pattern-name { font-size: 12px; font-weight: 700; }
.pattern-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: 0.06em;
}
.badge-act { background: rgba(124,158,217,0.2); color: var(--blue); border: 1px solid var(--blue); }
.badge-pas { background: rgba(224,123,106,0.2); color: var(--red); border: 1px solid var(--red); }
.badge-mid { background: rgba(176,144,224,0.2); color: var(--purple); border: 1px solid var(--purple); }

.pattern-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.pattern-table th {
  background: var(--card2);
  color: var(--text3);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 5px 8px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.pattern-table td {
  padding: 5px 8px;
  border-top: 1px solid var(--border);
  text-align: center;
}
.pattern-table td:first-child { color: var(--text3); font-size: 10px; font-weight: 600; }
.greek-cell { font-size: 13px; color: var(--gold2); font-family: 'Times New Roman', serif; }
.pron-cell { color: var(--text3); font-size: 10px; }
.meaning-cell { color: var(--text2); font-size: 10px; }

/* ── SET B: 어간 카드 ── */
.stem-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}

.stem-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.stem-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow); }
.stem-greek { font-size: 22px; color: var(--gold2); font-family: 'Times New Roman', serif; margin-bottom: 2px; }
.stem-pron { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
.stem-meaning { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 10px; }
.stem-table { width: 100%; border-collapse: collapse; font-size: 10px; }
.stem-table td { padding: 3px 6px; border-top: 1px solid var(--border); }
.stem-table td:first-child { color: var(--text3); width: 80px; }
.stem-greek-sm { color: var(--gold2); font-family: 'Times New Roman', serif; font-size: 12px; }
.stem-note { margin-top: 8px; font-size: 10px; color: var(--red2); background: rgba(224,123,106,0.1); border: 1px solid rgba(224,123,106,0.3); border-radius: 4px; padding: 4px 8px; }

/* ── SET C: 핵심 형태 암기카드 ── */
.flashcard-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.btn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn.primary { background: var(--gold); border-color: var(--gold); color: #0d1117; }
.btn.primary:hover { background: var(--gold2); }
.btn.danger { border-color: var(--red); color: var(--red); }

.card-count-display {
  font-size: 12px;
  color: var(--text2);
  margin-left: auto;
}

/* Single flashcard */
.flashcard-scene {
  perspective: 1000px;
  max-width: 500px;
  margin: 0 auto 20px;
  height: 280px;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
}
.flashcard-inner.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  border: 1px solid var(--border);
}
.flashcard-front {
  background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
}
.flashcard-back {
  background: linear-gradient(135deg, #1a2035 0%, #0f1a2a 100%);
  transform: rotateY(180deg);
  border-color: var(--gold);
}

.card-tense-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.card-greek-main {
  font-size: 36px;
  color: var(--gold2);
  font-family: 'Times New Roman', serif;
  margin-bottom: 8px;
  text-align: center;
}
.card-hint {
  font-size: 11px;
  color: var(--text3);
}
.card-back-pron {
  font-size: 14px;
  color: var(--text3);
  margin-bottom: 8px;
}
.card-back-meaning {
  font-size: 20px;
  color: var(--text);
  font-weight: 700;
  margin-bottom: 10px;
  text-align: center;
}
.card-back-analysis {
  font-size: 11px;
  color: var(--text2);
  text-align: center;
  line-height: 1.6;
}
.card-back-verb {
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
  margin-top: 8px;
}

.flip-hint {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 12px;
}

.nav-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
}
.nav-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--gold); color: var(--gold); }
.know-btn {
  background: rgba(111,207,151,0.15);
  border-color: var(--green);
  color: var(--green);
  font-size: 12px;
  width: auto;
  padding: 0 16px;
  border-radius: 8px;
}
.dontknow-btn {
  background: rgba(224,123,106,0.15);
  border-color: var(--red);
  color: var(--red);
  font-size: 12px;
  width: auto;
  padding: 0 16px;
  border-radius: 8px;
}

/* Card grid (browse mode) */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.mini-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.mini-card:hover { border-color: var(--gold); }
.mini-card.known { border-color: var(--green); background: rgba(111,207,151,0.05); }
.mini-greek { font-size: 16px; color: var(--gold2); font-family: 'Times New Roman', serif; margin-bottom: 3px; }
.mini-pron { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.mini-meaning { font-size: 11px; color: var(--text); font-weight: 600; }
.mini-tag { font-size: 9px; color: var(--text3); margin-top: 4px; }
.mini-known-badge {
  display: inline-block;
  background: var(--green);
  color: #0d1117;
  font-size: 8px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  margin-top: 3px;
}

/* tense color legend */
.tense-pres { color: var(--blue); }
.tense-fut  { color: var(--green); }
.tense-imp  { color: var(--purple); }
.tense-aor  { color: var(--red); }
.voice-act  { }
.voice-pas  { }
.voice-mid  { }

.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  font-size: 10px;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* View toggle */
.view-toggle {
  display: flex;
  gap: 4px;
}
.vtbtn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text3);
  font-size: 14px;
  width: 30px;
  height: 30px;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.vtbtn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-badge {
  font-size: 9px;
  background: rgba(201,168,76,0.15);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 1px 6px;
  border-radius: 4px;
}

.empty-msg {
  text-align: center;
  color: var(--text3);
  padding: 40px;
  font-size: 12px;
}
</style>

<style id="lnotes-back-btn-style">
#lnotes-back-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 9999;
  display: flex;
  align-items: center;

  padding: 8px 14px;
  background: rgba(20, 20, 28, 0.82);

  border: 1px solid rgba(180, 140, 60, 0.35);
  border-radius: 20px;
  color: #c9a84c;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  cursor: pointer;
}
#lnotes-back-btn:hover {
  background: rgba(30, 28, 20, 0.95);
  border-color: rgba(180, 140, 60, 0.7);

}
#lnotes-back-btn svg {

    left: 10px;
    padding: 7px 11px;

  }
}
</style>
</head>

<div class="header">
  <div>
    <div class="header-title">🏛 헬라어 동사 암기카드 — 시험 범위 완전판</div>
    <div class="header-sub">14개 동사 · 4시제 (현재/미래/미완료/단순과거) · 3태 (능동/수동/중간)</div>
  </div>
  <div class="header-stats">
    <span>전체 카드: <span class="stat-val" id="totalCount">0</span></span>
    <span>암기 완료: <span class="stat-val" id="knownCount">0</span></span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('setA')">묶음 A — 어미 패턴</button>
  <button class="tab-btn" onclick="switchTab('setB')">묶음 B — 어간 변화</button>
  <button class="tab-btn" onclick="switchTab('setC')">묶음 C — 핵심 형태</button>
  <button class="tab-btn" onclick="switchTab('browse')">전체 목록</button>
</div>

<!-- LEGEND -->
<div class="legend">
  <span style="color:var(--text3); font-weight:700; font-size:10px;">시제:</span>
  <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span class="tense-pres">현재</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span class="tense-fut">미래</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div><span class="tense-imp">미완료</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div><span class="tense-aor">단순과거</span></div>
  <span style="color:var(--text3); font-weight:700; font-size:10px; margin-left:8px;">태:</span>
  <div class="legend-item"><span style="color:var(--blue2)">능동</span></div>
  <div class="legend-item"><span style="color:var(--red2)">수동</span></div>
  <div class="legend-item"><span style="color:var(--purple)">중간</span></div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <span class="filter-label">시제</span>
  <div class="filter-group" id="tenseFilters">
    <button class="filter-chip tense-pres active" data-tense="현재" onclick="toggleFilter(this,'tense')">현재</button>
    <button class="filter-chip tense-fut active"  data-tense="미래"  onclick="toggleFilter(this,'tense')">미래</button>
    <button class="filter-chip tense-imp active"  data-tense="미완료" onclick="toggleFilter(this,'tense')">미완료</button>
    <button class="filter-chip tense-aor active"  data-tense="단순과거" onclick="toggleFilter(this,'tense')">단순과거</button>
  </div>
  <div class="sep"></div>
  <span class="filter-label">태</span>
  <div class="filter-group">
    <button class="filter-chip voice-act active" data-voice="능동" onclick="toggleFilter(this,'voice')">능동</button>
    <button class="filter-chip voice-pas active" data-voice="수동" onclick="toggleFilter(this,'voice')">수동</button>
    <button class="filter-chip voice-mid active" data-voice="중간" onclick="toggleFilter(this,'voice')">중간</button>
  </div>
  <div class="sep"></div>
  <span class="filter-label">동사</span>
  <div class="filter-group" id="verbFilters"></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>

<!-- SET A VIEW -->
<div class="view active" id="view-setA">
  <div class="section-title">묶음 A — 어미 패턴 카드 <span class="section-badge">공통 어미 암기</span></div>
  <div class="pattern-grid" id="patternGrid"></div>
</div>

<!-- SET B VIEW -->
<div class="view" id="view-setB">
  <div class="section-title">묶음 B — 어간 변화 카드 <span class="section-badge">동사별 어간</span></div>
  <div class="stem-grid" id="stemGrid"></div>
</div>

<!-- SET C VIEW -->
<div class="view" id="view-setC">
  <div class="flashcard-controls">
    <button class="btn primary" onclick="startStudy()">▶ 학습 시작</button>
    <button class="btn" onclick="shuffleCards()">🔀 섞기</button>
    <button class="btn" onclick="resetKnown()">↺ 초기화</button>
    <button class="btn" onclick="onlyUnknown()">모르는 것만</button>
    <div class="view-toggle" style="margin-left:auto;">
      <button class="vtbtn active" id="vtCard" onclick="setViewMode('card')" title="카드 모드">🃏</button>
      <button class="vtbtn" id="vtGrid" onclick="setViewMode('grid')" title="그리드 모드">⊞</button>
    </div>
  </div>
  
  <!-- Card study mode -->
  <div id="cardStudyMode">

    stems:[['현재 어간','ἐγειρ- (에게이르)'],['미래 어간','ἐγερ- (에게르) ε 탈락 주의!'],['과거 어간','ἤγειρ- (에게이르) 제1과거'],['과거수동','ἠγέρθ- (에게르뜨) ε탈락']],
    note: '⚠️ 미래/과거수동에서 어간 ε 탈락: ἐγείρ→ἐγερ' },
  { id:'baptizo',greek:'βαπτίζω', pron:'밥티조', meaning:'침례를 주다',
    stems:[['현재 어간','βαπτιζ- (밥티즈)'],['미래 어간','βαπτίσ- (밥티스) ζ→σ'],['과거 어간','ἐβάπτισ- (에밥티스)'],['과거수동','ἐβαπτίσθ- (에밥티스뜨)']],
    note: '⚠️ ζ → σ 자음 변화 (미래/과거)' },
  { id:'echo',   greek:'ἔχω', pron:'에코', meaning:'가지고 있다',
    stems:[['현재 어간','ἐχ- (에크)'],['미래 어간','ἕξ- (헥스) 규칙'],['과거 어간','ἔσχ- (에스크) 제2과거!'],['미완료 특이','εἶχ- (에이크) 가산모음 없음!']],
    note: '⚠️⚠️ 미완료 가산모음 없음! εἶχον (에이콘) — 시험 함정' },
  { id:'sozo',   greek:'σῴζω', pron:'소조', meaning:'구원하다, 치료하다',
    stems:[['현재 어간','σῳζ- (소즈)'],['미래 어간','σώσ- (소스) 규칙'],['과거 어간','ἔσωσ- (에소스)'],['과거수동','ἐσώθ- (에소뜨) θη 표지']],
    note: '⚠️ 두 가지 의미 필수: 구원하다 + 치료하다' },
];

// ════════════════════════════════════════════════════════
// FLASHCARD GENERATION
// ════════════════════════════════════════════════════════

let allCards = [];
let filteredCards = [];
let currentCardIdx = 0;
let isFlipped = false;
let knownSet = new Set();
let activeFilters = { tense: new Set(['현재','미래','미완료','단순과거']), voice: new Set(['능동','수동','중간']), verb: new Set(VERBS.map(v=>v.id)) };
let viewMode = 'card';

function buildCards() {
  allCards = [];
  VERBS.forEach(verb => {
    const conjs = CONJUGATIONS[verb.id] || [];
    conjs.forEach(conj => {
      conj.forms.forEach(row => {
        ['sg','pl'].forEach(num => {
          const f = row[num];
          allCards.push({
            verbId: verb.id,
            verbGreek: verb.greek,
            verbPron: verb.pron,
            verbMeaning: verb.meaning,
            tense: conj.tense,
            voice: conj.voice,
            person: row.p,
            number: num === 'sg' ? '단수' : '복수',
            greek: f[0],
            pron: f[1],
            meaning: f[2],
          });
        });
      });
    });
  });
}

function getFilteredCards() {
  return allCards.filter(c =>
    activeFilters.tense.has(c.tense) &&
    (activeFilters.voice.has(c.voice) || (c.voice.includes('/') && (activeFilters.voice.has('수동') || activeFilters.voice.has('중간')))) &&
    activeFilters.verb.has(c.verbId)
  );
}

function updateStats() {
  document.getElementById('totalCount').textContent = filteredCards.length;
  document.getElementById('knownCount').textContent = [...knownSet].filter(k => filteredCards.some(c => cardKey(c) === k)).length;
  const known = [...knownSet].filter(k => filteredCards.some(c => cardKey(c) === k)).length;
  const pct = filteredCards.length ? (known / filteredCards.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${known} / ${filteredCards.length}`;
}

function cardKey(c) { return `${c.verbId}_${c.tense}_${c.voice}_${c.person}_${c.number}`; }

function tenseColor(t) {
  if(t==='현재') return 'var(--blue)';
  if(t==='미래') return 'var(--green)';
  if(t==='미완료') return 'var(--purple)';
  if(t==='단순과거') return 'var(--red)';
  return 'var(--text3)';
}
function tenseKr(t) { return t; }

function renderCard(idx) {
  if(!filteredCards.length) return;
  const c = filteredCards[idx];
  const badge = document.getElementById('cardTenseBadge');
  badge.textContent = `${c.tense} · ${c.voice}태`;
  badge.style.background = tenseColor(c.tense) + '33';
  badge.style.color = tenseColor(c.tense);
  badge.style.border = `1px solid ${tenseColor(c.tense)}`;
  document.getElementById('cardGreek').textContent = c.greek;
  document.getElementById('cardHint').textContent = `${c.person}인칭 ${c.number} | ${c.verbGreek} (${c.verbPron})`;
  document.getElementById('cardPron').textContent = `(${c.pron})`;
  document.getElementById('cardMeaning').textContent = c.meaning;
  document.getElementById('cardAnalysis').textContent = `${c.tense}시제 · ${c.voice}태 · ${c.person}인칭 ${c.number}`;
  document.getElementById('cardVerb').textContent = `어원: ${c.verbGreek} (${c.verbPron}) — ${c.verbMeaning}`;
  document.getElementById('cardCountDisplay').textContent = `${idx + 1} / ${filteredCards.length}`;
  const inner = document.getElementById('flashcardInner');
  inner.classList.remove('flipped');
  isFlipped = false;
  if(knownSet.has(cardKey(c))) {
    inner.style.opacity = '0.7';
  } else {
    inner.style.opacity = '1';
  }
}

function flipCard() {
  const inner = document.getElementById('flashcardInner');
  inner.classList.toggle('flipped');
  isFlipped = !isFlipped;
}

function nextCard() {
  if(!filteredCards.length) return;
  currentCardIdx = (currentCardIdx + 1) % filteredCards.length;
  renderCard(currentCardIdx);
}

function prevCard() {
  if(!filteredCards.length) return;
  currentCardIdx = (currentCardIdx - 1 + filteredCards.length) % filteredCards.length;
  renderCard(currentCardIdx);
}

function markCard(known) {
  if(!filteredCards.length) return;
  const c = filteredCards[currentCardIdx];
  const k = cardKey(c);
  if(known) knownSet.add(k); else knownSet.delete(k);
  updateStats();
  nextCard();
  if(viewMode === 'grid') renderSetCGrid();
}

function startStudy() {
  filteredCards = getFilteredCards();
  currentCardIdx = 0;
  setViewMode('card');
  renderCard(0);
  updateStats();
}

function shuffleCards() {
  filteredCards = getFilteredCards().sort(() => Math.random() - 0.5);
  currentCardIdx = 0;
  renderCard(0);
}

function resetKnown() {
  knownSet.clear();
  updateStats();
  if(viewMode==='grid') renderSetCGrid();
}

function onlyUnknown() {
  filteredCards = getFilteredCards().filter(c => !knownSet.has(cardKey(c)));
  currentCardIdx = 0;
  if(filteredCards.length) renderCard(0);
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('vtCard').classList.toggle('active', mode==='card');
  document.getElementById('vtGrid').classList.toggle('active', mode==='grid');
  document.getElementById('cardStudyMode').style.display = mode==='card' ? 'block' : 'none';
  document.getElementById('gridBrowseMode').style.display = mode==='grid' ? 'block' : 'none';
  if(mode==='grid') renderSetCGrid();
}

function renderSetCGrid() {
  const grid = document.getElementById('setcGrid');
  grid.innerHTML = '';
  filteredCards.forEach((c,i) => {
    const known = knownSet.has(cardKey(c));
    const el = document.createElement('div');
    el.className = 'mini-card' + (known ? ' known' : '');
    el.style.borderLeft = `3px solid ${tenseColor(c.tense)}`;
    el.innerHTML = `
      <div class="mini-greek">${c.greek}</div>
      <div class="mini-pron">(${c.pron})</div>
      <div class="mini-meaning">${c.meaning}</div>
      <div class="mini-tag">${c.tense} · ${c.voice}태 · ${c.person}인칭 ${c.number} | ${c.verbGreek}</div>
      ${known ? '<div class="mini-known-badge">✓ 암기</div>' : ''}
    `;
    el.onclick = () => { currentCardIdx = i; setViewMode('card'); renderCard(i); };
    grid.appendChild(el);
  });
}

function renderBrowseGrid() {
  const grid = document.getElementById('browseGrid');
  const cards = getFilteredCards();
  document.getElementById('browseCount').textContent = cards.length + '개 형태';
  grid.innerHTML = '';
  cards.forEach((c,i) => {
    const el = document.createElement('div');
    el.className = 'mini-card';
    el.style.borderLeft = `3px solid ${tenseColor(c.tense)}`;
    el.innerHTML = `
      <div class="mini-greek">${c.greek}</div>
      <div class="mini-pron">(${c.pron})</div>
      <div class="mini-meaning">${c.meaning}</div>
      <div class="mini-tag">${c.tense} · ${c.voice}태 · ${c.person}인칭 ${c.number}</div>
      <div class="mini-tag" style="color:var(--gold)">${c.verbGreek} — ${c.verbMeaning}</div>
    `;
    grid.appendChild(el);
  });
}

// ── FILTER LOGIC ──
function toggleFilter(btn, type) {
  const val = btn.dataset.tense || btn.dataset.voice || btn.dataset.verb;
  if(activeFilters[type].has(val)) {
    if(activeFilters[type].size > 1) activeFilters[type].delete(val);
  } else {
    activeFilters[type].add(val);
  }
  btn.classList.toggle('active', activeFilters[type].has(val));
  filteredCards = getFilteredCards();
  currentCardIdx = 0;
  if(filteredCards.length) renderCard(0);
  updateStats();
  if(viewMode==='grid') renderSetCGrid();
  renderBrowseGrid();
}

// ── BUILD VERB FILTER CHIPS ──
function buildVerbFilters() {
  const wrap = document.getElementById('verbFilters');
  VERBS.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip active';
    btn.dataset.verb = v.id;
    btn.textContent = v.pron;
    btn.onclick = function(){ toggleFilter(this, 'verb'); };
    wrap.appendChild(btn);
  });
}

// ── RENDER SET A ──
function renderSetA() {
  const grid = document.getElementById('patternGrid');
  PATTERNS_A.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pattern-card';
    const voiceBadgeClass = p.voice.includes('능동') ? 'badge-act' : p.voice.includes('수동') ? 'badge-pas' : 'badge-mid';
    card.innerHTML = `
      <div class="pattern-head" style="background:${p.tenseColor}22; border-bottom:1px solid ${p.tenseColor}44;">
        <div class="pattern-name" style="color:${p.tenseColor}">${p.name}</div>
        <div class="pattern-badge ${voiceBadgeClass}">${p.voice}</div>
      </div>
      <table class="pattern-table">
        <thead><tr><th>인칭</th><th>어미</th><th>해석</th></tr></thead>
        <tbody>
          ${p.rows.map(r=>`<tr><td>${r[0]}</td><td class="greek-cell">${r[1]}</td><td class="meaning-cell">${r[2]}</td></tr>`).join('')}
        </tbody>
      </table>
      <div style="padding:6px 10px;font-size:9px;color:var(--gold);border-top:1px solid var(--border)">💡 ${p.note}</div>
    `;
    grid.appendChild(card);
  });
}

// ── RENDER SET B ──
function renderSetB() {
  const grid = document.getElementById('stemGrid');
  STEMS_B.forEach(s => {
    const el = document.createElement('div');
    el.className = 'stem-card';
    el.innerHTML = `
      <div class="stem-greek">${s.greek}</div>
      <div class="stem-pron">(${s.pron})</div>
      <div class="stem-meaning">${s.meaning}</div>
      <table class="stem-table">
        ${s.stems.map(([k,v])=>`<tr><td>${k}</td><td class="stem-greek-sm">${v}</td></tr>`).join('')}
      </table>
      <div class="stem-note">${s.note}</div>
    `;
    grid.appendChild(el);
  });
}

// ── TAB SWITCHING ──
function switchTab(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  event.target.classList.add('active');
  if(id==='browse') renderBrowseGrid();
  if(id==='setC') { filteredCards = getFilteredCards(); renderCard(currentCardIdx); updateStats(); }
}

// ── INIT ──
buildCards();
buildVerbFilters();
renderSetA();
renderSetB();
filteredCards = getFilteredCards();
renderCard(0);
updateStats();
</script>
