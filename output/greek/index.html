<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헬라어 — 학습 앱 모음</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=IM+Fell+English:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --navy: #1B2A4A;
  --navy-mid: #2C3E6B;
  --navy-lt: #3D5490;
  --gold: #C9A84C;
  --gold-lt: #F0D080;
  --gold-pale: #FBF3DC;
  --cream: #F5F0E8;
  --white: #FFFFFF;
  --gray: #8A9BB0;
  --gray-lt: #D8DDED;
  --shadow: 0 4px 24px rgba(27,42,74,.12);
  --shadow-lg: 0 8px 40px rgba(27,42,74,.18);
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--navy);
  min-height: 100vh;
}

/* ── TOP NAV ── */
.top-nav {
  background: var(--navy);
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 56px;
  border-bottom: 2.5px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--gold-lt);
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  opacity: .8;
  transition: opacity .2s;
}
.nav-back:hover { opacity: 1; }
.nav-back svg { width: 16px; height: 16px; }

.nav-title {
  font-family: 'IM Fell English', serif;
  font-size: 20px;
  color: var(--gold-lt);
  letter-spacing: 1px;
  margin: 0 auto;
}

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 48px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: 'Ελληνικά';
  font-family: 'IM Fell English', serif;
  font-size: 80px;
  color: rgba(255,255,255,.04);
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  white-space: nowrap;
  pointer-events: none;
  letter-spacing: 4px;
}

.hero-badge {
  display: inline-block;
  background: rgba(201,168,76,.15);
  border: 1px solid rgba(201,168,76,.4);
  color: var(--gold-lt);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
}

.hero h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
  line-height: 1.3;
}

.hero h1 em {
  font-style: normal;
  color: var(--gold-lt);
}

.hero p {
  font-size: 13px;
  color: var(--gray);
  font-weight: 300;
  line-height: 1.6;
}

.hero-divider {
  width: 40px;
  height: 2px;
  background: var(--gold);
  margin: 16px auto 0;
  border-radius: 2px;
  opacity: .6;
}

/* ── MAIN CONTENT ── */
.main {
  max-width: 760px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gray-lt);
}

/* ── APP GRID ── */
.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

.app-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  border: 1.5px solid transparent;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  cursor: pointer;
}

.app-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--gold);
}

.app-card:active { transform: scale(.98); }

.card-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 22px 20px 18px;
  position: relative;
  overflow: hidden;
}

.card-header::before {
  content: attr(data-letter);
  font-family: 'IM Fell English', serif;
  font-size: 64px;
  color: rgba(255,255,255,.07);
  position: absolute;
  right: 14px;
  top: -4px;
  line-height: 1;
  pointer-events: none;
}

.card-badge {
  display: inline-block;
  background: rgba(201,168,76,.2);
  border: 1px solid rgba(201,168,76,.35);
  color: var(--gold-lt);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.card-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 4px;
}

.card-subtitle {
  font-size: 11.5px;
  color: var(--gold-lt);
  font-weight: 300;
  opacity: .8;
}

.card-body {
  padding: 16px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card-desc {
  font-size: 12.5px;
  color: #5a6a80;
  line-height: 1.6;
  font-weight: 300;
}

.card-modes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.mode-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--gold-pale);
  color: #7a5c1a;
  font-size: 10.5px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 10px;
  border: 1px solid rgba(201,168,76,.25);
}

.mode-tag .icon { font-size: 11px; }

.card-footer {
  padding: 12px 20px;
  background: #f8f5ef;
  border-top: 1px solid var(--gray-lt);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-cta {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--navy-lt);
  letter-spacing: .3px;
}

.card-arrow {
  width: 28px;
  height: 28px;
  background: var(--navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, transform .2s;
}

.app-card:hover .card-arrow {
  background: var(--gold);
  transform: translateX(2px);
}

.card-arrow svg {
  width: 13px;
  height: 13px;
  fill: none;
  stroke: #fff;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 24px;
  font-size: 11px;
  color: var(--gray);
  border-top: 1px solid var(--gray-lt);
  margin-top: 20px;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .hero h1 { font-size: 22px; }
  .hero { padding: 36px 18px 30px; }
  .main { padding: 24px 14px 50px; }
  .app-grid { grid-template-columns: 1fr; }
}
</style>
</head>
